name: Deploy Backend Python

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cine-ai-back:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          source: "docker-compose.yml"
          target: "/app/cine-ai-back"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: 22
          envs: DOCKER_USERNAME,DOCKER_PASSWORD 
          script: |

            docker network create web-public || true
            cd /app/cine-ai-back

            # 2. Recriando o .env
            echo "OPENROUTER_API_KEY=${{ secrets.API_KEY }}" > .env
            echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
            
            # 3. Baixa a nova imagem e atualiza
            docker compose pull
            docker compose up -d --remove-orphans
            
            # 4. Limpeza
            docker image prune -f
            docker logout